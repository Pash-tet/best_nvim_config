# Конфиг форматтера Lua (stylua). Читается автоматически: stylua ищет
# stylua.toml от форматируемого файла ВВЕРХ по родительским каталогам.
#
# ЗАЧЕМ ЭТОТ ФАЙЛ СУЩЕСТВУЕТ (не косметика, а починка реального бага):
# без него stylua берёт СВОИ дефолты — indent_type = "Tabs", indent_width = 4.
# А conform вызывает stylua на КАЖДОЕ сохранение .lua (BufWritePre, см.
# lua/plugins/formatting.lua), поэтому одно :w молча переписывало наш
# 2-пробельный конфиг в табы — прямо против expandtab/shiftwidth = 2 из
# lua/core/options.lua. Проверено воспроизведением: сохранение копии
# plugins/autotag.lua превращало все отступы в табы. Заметно это стало не
# сразу: файлы, которые пишет Claude напрямую на диск, идут МИМО conform, и
# формат применялся только к тем файлам, что сохранялись руками в nvim —
# отсюда единственный затабленный plugins/dashboard.lua.
#
# ПРАВИЛО: значения ниже должны совпадать с lua/core/options.lua.
# Редактор и форматтер обязаны говорить одно и то же, иначе один молча
# переделывает работу другого на каждом сохранении.

indent_type = "Spaces"
indent_width = 2

# 120 — дефолт stylua, оставляем явно: у нас длинные пояснительные
# комментарии, и молчаливая смена дефолта в будущей версии stylua
# переразбила бы существующие строки.
column_width = 120
line_endings = "Unix"
quote_style = "AutoPreferDouble"

# ЗНАЙ ПРО ПОБОЧНЫЙ ЭФФЕКТ: stylua нормализует пробелы ПЕРЕД хвостовым
# комментарием — ручное выравнивание в колонку
#   opt.tabstop = 2        -- ...
# схлопывается до
#   opt.tabstop = 2 -- ...
# Отключить это нельзя (у stylua нет опции выравнивания комментариев). Сам
# текст комментариев не страдает — только колоночное выравнивание.
